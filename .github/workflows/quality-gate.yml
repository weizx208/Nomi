name: Quality Gate

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm run build
  mac-package:
    name: Mac Package
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Package macOS app
        run: pnpm run dist:mac:dir
      - name: Verify macOS signature
        run: codesign --verify --deep --strict --verbose=4 release/mac-arm64/Nomi.app
