<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/nomi-logo.svg" />
    <link rel="stylesheet" href="/tailwind.generated.css" />
    <title>Nomi</title>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f7f4ed;
      }

      #nomi-boot-shell {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        color: #2a2118;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      #nomi-boot-spinner {
        width: 24px;
        height: 24px;
        border-radius: 999px;
        border: 1px solid rgba(42, 33, 24, 0.14);
        border-top-color: #9a6a3c;
        animation: nomi-boot-spin 680ms linear infinite;
      }

      @keyframes nomi-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="nomi-boot-shell" aria-label="Nomi loading">
        <div id="nomi-boot-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
